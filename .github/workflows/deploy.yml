name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # LINT & TEST
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Build TypeScript
        run: cd backend && npm run build

      - name: Run Tests
        run: cd backend && npm test

      - name: Test Coverage
        run: cd backend && npm run test:coverage

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY FRONTEND (Netlify)
  # ═══════════════════════════════════════════════════════════════
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Nuxt Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
          NUXT_PUBLIC_BACKEND_URL: ${{ secrets.NUXT_PUBLIC_BACKEND_URL }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}

      - name: Deploy Frontend to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: 'frontend/.output/public'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "🚀 Deploy Nuxt Frontend from GitHub Actions"
          github-deployment-environment: production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: 📱 Frontend deployed!
        run: echo "✅ Frontend live at your Netlify URL"

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY BACKEND (Railway.app)
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service backend

      - name: 🔧 Backend deployed!
        run: echo "✅ Backend live on Railway"

  # ═══════════════════════════════════════════════════════════════
  # NOTIFY (Sentry, Slack, etc)
  # ═══════════════════════════════════════════════════════════════
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-frontend.result }}" = "success" ] && [ "${{ needs.deploy-backend.result }}" = "success" ]; then
            echo "✅ Full deployment successful!"
          else
            echo "⚠️ Deployment had issues"
          fi

      - name: Notify Sentry
        run: 'echo "Optional: Send deployment event to Sentry"'
