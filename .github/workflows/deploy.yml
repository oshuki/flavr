name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # LINT & TEST
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Build TypeScript
        run: cd backend && npm run build

      - name: Run Tests
        run: cd backend && npm test

      - name: Test Coverage
        run: cd backend && npm run test:coverage

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND BUILD CHECK (Cloudflare Pages deploys via Git integration)
  # ═══════════════════════════════════════════════════════════════
  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Nuxt Frontend (Static Output)
        working-directory: ./frontend
        run: |
          npm ci
          npm run generate
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
          NUXT_PUBLIC_BACKEND_URL: ${{ secrets.NUXT_PUBLIC_BACKEND_URL }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}

      - name: 📱 Frontend build validated
        run: echo "✅ Nuxt static build succeeded. Cloudflare Pages handles deployment from Git."

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY BACKEND (Render)
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: 🔧 Backend deployed!
        run: echo "✅ Backend deploy triggered on Render"

  # ═══════════════════════════════════════════════════════════════
  # NOTIFY (Sentry, Slack, etc)
  # ═══════════════════════════════════════════════════════════════
  notify:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-frontend.result }}" = "success" ] && { [ "${{ needs.deploy-backend.result }}" = "success" ] || [ "${{ needs.deploy-backend.result }}" = "skipped" ]; }; then
            echo "✅ Frontend build passed and backend deploy step is healthy (success or intentionally skipped)."
          else
            echo "⚠️ Deployment had issues"
          fi

      - name: Notify Sentry
        run: 'echo "Optional: Send deployment event to Sentry"'
