name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # LINT & TEST
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Build TypeScript
        run: cd backend && npm run build

      - name: Run Tests
        run: cd backend && npm test

      - name: Test Coverage
        run: cd backend && npm run test:coverage

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND BUILD CHECK (Cloudflare Pages deploys via Git integration)
  # ═══════════════════════════════════════════════════════════════
  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Nuxt Frontend (Static Output)
        working-directory: ./frontend
        run: |
          npm ci
          npm run generate
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}
          NUXT_PUBLIC_BACKEND_URL: ${{ secrets.NUXT_PUBLIC_BACKEND_URL }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}

      - name: 📱 Frontend build validated
        run: echo "✅ Nuxt static build succeeded. Cloudflare Pages handles deployment from Git."

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY BACKEND (Railway.app)
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service backend

      - name: 🔧 Backend deployed!
        run: echo "✅ Backend live on Railway"

  # ═══════════════════════════════════════════════════════════════
  # NOTIFY (Sentry, Slack, etc)
  # ═══════════════════════════════════════════════════════════════
  notify:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.build-frontend.result }}" = "success" ] && [ "${{ needs.deploy-backend.result }}" = "success" ]; then
            echo "✅ Backend deployed (Railway) and frontend build passed (Cloudflare deploy via Git)."
          else
            echo "⚠️ Deployment had issues"
          fi

      - name: Notify Sentry
        run: 'echo "Optional: Send deployment event to Sentry"'
