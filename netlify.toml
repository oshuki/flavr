# Netlify Deployment Configuration for Nuxt 3 SPA Frontend

[build]
  base = "frontend"
  command = "npm install && npm run generate"
  publish = ".output/public"

# SPA Redirect - all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set in Netlify UI: Site settings → Environment variables)
# NUXT_PUBLIC_BACKEND_URL=https://your-backend.railway.app
# NUXT_PUBLIC_SENTRY_DSN=https://...
# NUXT_PUBLIC_SUPABASE_URL=https://...
# NUXT_PUBLIC_SUPABASE_KEY=...
  
# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com https://image.pollinations.ai https://htescszituyzooubmxkh.supabase.co https://o4511226172145664.ingest.de.sentry.io https://*.railway.app; object-src 'none';"

# Performance headers
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
