# Netlify Deployment Configuration for Nuxt 3 Frontend

[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = ".output/public"

# Environment variables (set in Netlify UI: Site settings → Environment variables)
# SENTRY_DSN_FRONTEND=https://...
  
# Nuxt automatically handles redirects via server routes
# No custom redirects needed for SSR

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com https://image.pollinations.ai https://htescszituyzooubmxkh.supabase.co https://o4511226172145664.ingest.de.sentry.io; object-src 'none';"

# Performance headers
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
